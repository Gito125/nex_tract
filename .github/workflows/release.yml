name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            build-cmd: 'cd server && powershell -ExecutionPolicy Bypass -File build-server.ps1'
          - platform: 'ubuntu-latest'
            build-cmd: 'cd server && chmod +x build-server.sh && ./build-server.sh'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build Python Sidecar
        run: ${{ matrix.build-cmd }}

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ffmpegDir = "src-tauri/resources"
          New-Item -ItemType Directory -Force -Path $ffmpegDir | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract -Force
          $ffmpegExe = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName "$ffmpegDir/ffmpeg.exe"
          Remove-Item -Recurse ffmpeg.zip, ffmpeg-extract

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          mkdir -p src-tauri/resources
          wget -q https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffmpeg-6.1-linux-64.zip
          unzip -o ffmpeg-6.1-linux-64.zip -d src-tauri/resources
          chmod +x src-tauri/resources/ffmpeg
          rm ffmpeg-6.1-linux-64.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Frontend Dependencies & Export
        run: |
          cd web
          pnpm install
          pnpm build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Build Desktop Application (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: nextract-v__VERSION__ # tauri-action automatically replaces __VERSION__ with version from tauri.conf.json
          releaseName: 'Nextract v__VERSION__'
          releaseBody: 'Nextract release build. Installers for Windows and Linux.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
